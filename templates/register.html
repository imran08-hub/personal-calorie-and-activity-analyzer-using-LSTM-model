{% extends 'base.html' %}
{% block title %}Register – NutriAI{% endblock %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
          <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#a8e063" stroke-width="2"/>
          <circle cx="14" cy="14" r="4" fill="#a8e063"/>
        </svg>
      </div>
      NutriAI
    </div>
    <div class="auth-sub">Create your personalized nutrition profile</div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="auth-grid">
        <div class="field"><label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required/></div>
        <div class="field"><label>Email Address</label>
          <input type="email" name="email" placeholder="john@example.com" required/></div>
      </div>
      <div class="field"><label>Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" required minlength="6"/></div>
      <div class="auth-grid">
        <div class="field"><label>Age</label>
          <input type="number" name="age" placeholder="25" min="10" max="100" required/></div>
        <div class="field"><label>Gender</label>
          <select name="gender" required>
            <option value="">Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select></div>
      </div>
      <div class="auth-grid">
        <div class="field"><label>Height (cm)</label>
          <input type="number" name="height" placeholder="170" min="100" max="250" step="0.1" required/></div>
        <div class="field"><label>Weight (kg)</label>
          <input type="number" name="weight" placeholder="70" min="20" max="300" step="0.1" required/></div>
      </div>
      <div class="field"><label>Activity Level</label>
        <select name="activity">
          <option value="sedentary">Sedentary (office job, no exercise)</option>
          <option value="light">Light (1–3x/week exercise)</option>
          <option value="moderate" selected>Moderate (3–5x/week exercise)</option>
          <option value="active">Active (6–7x/week exercise)</option>
          <option value="very_active">Very Active (physical job + exercise)</option>
        </select></div>
      <button type="submit" class="btn btn-primary" style="margin-top:.5rem">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
